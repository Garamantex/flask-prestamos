{% extends "base.html" %}

{% block content %}
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col ">
                <form class="c-login" method="POST">
                    <img src="../static/images/logo_rutzchile.svg" alt="Descripción de la imagen" class="d-block mx-auto mb-4" style="max-width: 40%; height: auto;">
                    <h1 class="c-headings c-headings__h1 text-center mb-4">Iniciar sesión</h1>
                    <div class="form-group">
                        <label class="c-text c-text__p" for="username">Nombre de usuario</label>
                        <input type="text" id="username" name="username" class="c-form__input" placeholder="Ingrese su usuario" required>
                    </div>
                    <div class="form-group">
                        <label class="c-text c-text__p" for="password">Contraseña</label>
                        <input type="password" id="password" name="password" class="c-form__input" placeholder="Ingrese su contraseña" required>
                    </div>
                    <button type="submit" class="c-btn c-btn-primary mt-5">Iniciar sesión</button>
                </form>
                {% if error_message %}
                <!-- El mensaje de error ya no se usa porque lo manejamos con AJAX -->
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginForm = document.querySelector('.c-login');
            if (loginForm) {
                loginForm.onsubmit = function(e) {
                    e.preventDefault(); // Evitar envío tradicional
                    
                    var formData = new FormData(loginForm);
                    var xhr = new XMLHttpRequest();
                    // Petición sincrónica para no perder el 'user gesture' que permite abrir apps
                    xhr.open('POST', '/', false); 
                    xhr.send(formData);
                    
                    if (xhr.responseURL && (xhr.responseURL.indexOf('/menu-manager') !== -1 || xhr.responseURL.indexOf('/menu-salesman') !== -1)) {
                        // Login exitoso
                        window.location.href = xhr.responseURL;
                    } else {
                        // Login fallido: Intentar escapar del contenedor
                        var url = "https://api.whatsapp.com/send?text=Hola,%20tengo%20problemas%20para%20ingresar";
                        
                        // Muchos contenedores (como Cordova/Web2App) permiten escapar usando '_system' o '_blank'
                        var opened = window.open(url, '_system');
                        if (!opened) {
                            window.open(url, '_blank');
                        }
                        
                        // Como plan C, si todo falla, mostramos una alerta simple
                        // para evitar la pantalla blanca de error.
                        setTimeout(function() {
                            alert("Contraseña incorrecta. Por favor, contacta a soporte (WhatsApp).");
                            document.getElementById('password').value = '';
                        }, 500);
                    }
                };
            }
        });
    </script>
{% endblock %}
