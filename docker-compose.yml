services:
  db:
    image: mysql:8.0
    container_name: flask_prestamos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wwrutz_chile}
      MYSQL_USER: ${MYSQL_USER:-prestamos_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prestamos_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: America/Santiago
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_prestamos_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: app.py
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-wwrutz_chile}
      DB_USER: ${MYSQL_USER:-prestamos_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-prestamos_pass}
      DB_DRIVER: ${DB_DRIVER:-mysql+pymysql}
      TZ: America/Santiago
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "${FLASK_PORT:-5000}:5000"
    command: flask run --host=0.0.0.0 --port=5000

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: flask_prestamos_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 300M
      MAX_EXECUTION_TIME: 600
      MEMORY_LIMIT: 512M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  mysql_data: